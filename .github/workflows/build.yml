name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S ofx -B ofx/build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build ofx/build --config Release

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Compile installer
        shell: pwsh
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\NimbusDiffusion.iss'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NimbusDiffusion-Windows-Setup
          path: installer/NimbusDiffusion-*-Windows-Setup.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: installer/NimbusDiffusion-*-Windows-Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
