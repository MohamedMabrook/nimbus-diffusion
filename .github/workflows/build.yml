name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S ofx -B ofx/build -A x64

      - name: Build
        run: cmake --build ofx/build --config Release

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Compile installer
        shell: pwsh
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\NimbusDiffusion.iss'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NimbusDiffusion-Windows-Setup
          path: installer/NimbusDiffusion-*-Windows-Setup.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.ref_name }}"
          file=$(ls installer/NimbusDiffusion-*-Windows-Setup.exe)
          gh release create "$tag" --title "Nimbus Diffusion $tag" --generate-notes 2>/dev/null || true
          gh release upload "$tag" "$file" --clobber
