name: Build Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Cache OpenFX headers
        uses: actions/cache@v4
        with:
          path: ofx/build/_deps
          key: openfx-win-${{ hashFiles('ofx/CMakeLists.txt') }}

      - name: Configure
        run: cmake -S ofx -B ofx/build -A x64

      - name: Build
        run: cmake --build ofx/build --config Release --parallel

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Compile installer
        shell: pwsh
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\NimbusDiffusion.iss'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NimbusDiffusion-Windows-Setup
          path: installer/NimbusDiffusion-*-Windows-Setup.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.ref_name }}"
          file=$(ls installer/NimbusDiffusion-*-Windows-Setup.exe)
          gh release create "$tag" --title "Nimbus Diffusion $tag" --generate-notes 2>/dev/null || true
          gh release upload "$tag" "$file" --clobber

  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Cache OpenFX headers
        uses: actions/cache@v4
        with:
          path: ofx/build/_deps
          key: openfx-mac-${{ hashFiles('ofx/CMakeLists.txt') }}

      - name: Configure
        # CMakeLists already sets OSX_ARCHITECTURES=arm64;x86_64 — universal binary
        run: cmake -S ofx -B ofx/build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build ofx/build --config Release --parallel

      - name: Verify universal binary
        run: lipo -info ofx/build/NimbusDiffusor.ofx.bundle/Contents/MacOS/NimbusDiffusor.ofx

      - name: Get version
        id: ver
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=dev" >> $GITHUB_OUTPUT
          fi

      - name: Package .pkg
        run: |
          # stage just the bundle so pkgbuild installs only that into /Library/OFX/Plugins
          mkdir -p staging
          cp -r ofx/build/NimbusDiffusor.ofx.bundle staging/
          pkgbuild \
            --root staging \
            --identifier "com.nimbusdiffusor.NimbusDiffusion" \
            --version "${{ steps.ver.outputs.version }}" \
            --install-location "/Library/OFX/Plugins" \
            "NimbusDiffusion-${{ steps.ver.outputs.version }}-macOS.pkg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NimbusDiffusion-macOS
          path: NimbusDiffusion-*-macOS.pkg

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.ref_name }}"
          file=$(ls NimbusDiffusion-*-macOS.pkg)
          gh release create "$tag" --title "Nimbus Diffusion $tag" --generate-notes 2>/dev/null || true
          gh release upload "$tag" "$file" --clobber
